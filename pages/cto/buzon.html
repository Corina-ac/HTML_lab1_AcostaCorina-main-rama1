<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
     * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    header {
            text-align: center;
            padding: 20px 10px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background: linear-gradient(135deg, #f0f8ff 0%, #e0ffff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

    h1 {
            font-size: 2.5em;
            color: #008B8B;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }

</style>
    

<body>
    <header>
        <h1>Buzon de sugerencia</h1>
    </header>

    
    <p><b>¿Tienes alguna sugerencia??</p>
    <section>
        <form action="#" method="get">
            <label for="sugerencia">Tu sugerencia:</label>
            <br>
            <textarea id="sugerencia" name="sugerencia" rows="4" cols="50"></textarea>
        
            <br>
            <button type="submit" >Enviar</button>
        </form>
    </section>
</body>
</html>
